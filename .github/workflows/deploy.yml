name: Deploy web and Windows desktop

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web app
        working-directory: web
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist/web/browser

  deploy-pages:
    name: Publish GitHub Pages
    runs-on: ubuntu-latest
    needs: pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  windows-desktop:
    name: Windows .exe → release/
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop
        run: npm run dist:win

      - name: Copy installer to release/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $installer = Get-ChildItem -Path desktop/release -Filter "*-win.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found in desktop/release"
          }
          Copy-Item $installer.FullName release/SELeCT-Toddler-win.exe -Force
          $version = (Get-Content desktop/package.json | ConvertFrom-Json).version
          Set-Content -Path release/version.txt -Value $version

      - name: Commit and push release folder
        shell: bash
        run: |
          git lfs install
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/
          if git diff --staged --quiet; then
            echo "No installer changes to commit."
            exit 0
          fi
          git commit -m "ci: update Windows desktop installer [skip ci]"
          git push
